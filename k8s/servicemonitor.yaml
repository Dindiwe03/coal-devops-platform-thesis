apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: coal-monitor-sm
  namespace: coal-devops
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: coal-monitor
  namespaceSelector:
    matchNames:
      - coal-devops
  endpoints:
    - port: http
      path: /metrics
      interval: 5s
